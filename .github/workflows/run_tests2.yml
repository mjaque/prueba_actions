name: Run JUnit Tests

on:
  push:
    branches: [ "main" ]  # Ejecuta en cada push a la rama "main"
  pull_request:
    branches: [ "main" ]  # También ejecuta en pull requests a "main"

jobs:
  test:
    runs-on: ubuntu-latest  # Usa un entorno Ubuntu

    steps:
      - uses: actions/checkout@v4  # Descarga el código del repositorio

      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          java-version: '23'  # Usa Java 17 (puedes cambiar la versión)
          distribution: 'temurin'

      - name: Compile and run tests
        run: |
          # Compila las clases principales
          javac -d compilados fuentes/*.java

          # Compila los tests con las dependencias de JUnit
          javac -d compilados -cp "lib/junit-platform-console-standalone-1.14.3.jar:compilados" tests/*.java

          # Ejecuta los tests con JUnit
          java -jar lib/junit-platform-console-standalone-1.14.3.jar --class-path compilados --scan-class-path
